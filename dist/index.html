<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="min-h-screen flex">
    <!-- Screen Split -->
    <div class="w-full min-h-screen flex flex-col md:flex-row">
         <!-- Lado esquerdo (roxo) -->
        <div class="hidden md:flex md:w-1/2 bg-indigo-700 flex-col justify-center items-star p-16 text-white">
            
            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
            <div class="logo-box">F</div>
            <span class="text-2x1 font-bold">Fintech</span>
        </div>
        
            <!-- Titulo -->
            <h1 class="text4x1 font-bold leading-tight mb-4">
                Gerencie suas finanças de forma simples e segura.
            </h1>
            <p class="text-indigo-200 text-lg mb-10" >Sistema Financeiro</p>

            <!-- Cards beneficios -->
             <div class="space-y-3 w-full">
                <div class="flex items-center gap-3 bg-indigo-600 rounded-lg px-4 py-3">
                    <span>💸</span>
                    <span class="text-sm">Transferências PIX instantâneas</span>
                </div>
                <div class="flex items-center gap-3 bg-indigo-600 rounded-lg px-4 py-3">
                    <span>📊</span>
                    <span class="text-sm">Extrato e relatórios completos</span>
                    </div>
                <div class="flex items-center gap-3 bg-indigo-600 rounded-lg px-4 py-3">
                    <span>🔒</span>
                    <span class="text-sm">Segurança em todos os acessos</span>    
             </div>



        <!-- Lado direito (escuro) -->
         <div class="w-full md:w-1/2 bg-gray-900">
            direita
         </div>
    </div>
</body>
</html>
